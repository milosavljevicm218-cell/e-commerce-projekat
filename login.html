<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="stylesheet" href="css/login.css" type="text/css">
    <link rel="icon" href="images/logo.png" type="image/png">
    <title>Luxor-Login Page</title>
</head>
<body>
    <header class="shadow-sm p-3">
        <div class="container d-flex align-items-center justify-content-between">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <img src="images/logo.png" alt="Luxor logo" class="logo-img">
                <span class="fs-3 fw-bold">Luxor</span>
            </a>
            <nav class="navbar navbar-expand-lg mx-auto">
                <div class="collapse navbar-collapse" id="luxorNav">
                    <ul class="navbar-nav gap-4">
                        <li class="nav-item"><a class="nav-link fs-5" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link fs-5" href="#">About</a></li>
                        <li class="nav-item"><a class="nav-link fs-5" href="product.html">Shop</a></li>
                        <li class="nav-item"><a class="nav-link fs-5" href="#">Contact</a></li>
                    </ul>
                </div>
            </nav>
            <div class="d-flex align-items-center">
                <form class="me-4 d-none d-md-block">
                    <input class="form-control" type="search" placeholder="Search..." aria-label="Search">
                </form>
                <div class="d-flex align-items-center gap-3">
                    <a href="checkout.html">
                        <img src="images/cart.png" alt="Cart" class="nav-icon" onclick="openCart()">
                    </a>
                    <a href="login.html">
                        <img src="images/login.png" alt="Login" class="nav-icon">
                    </a>
                </div>
                <button class="navbar-toggler ms-3" type="button" data-bs-toggle="collapse" data-bs-target="#luxorNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </header>
    <main class="d-flex align-items-center justify-content-center vh-100">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4 col-xl-3">
            <h2 class="text-center display-4 mb-4">Login</h2>
            <div class="card custom-form-box border-0 shadow-lg text-dark">
                <div class="card-body p-4 p-md-5">
                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="text" id="email" class="form-control" placeholder="example@mail.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Password:</label>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-luxor w-100 fw-bold py-3 text-uppercase" onclick="checkLogin(event)">
                            Login
                        </button>
                        <div class="text-center mt-3">
                            <a href="#" class="small text-decoration-none text-muted">Forgot password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class=" footer-custom text-center px-0 py-5">
        <div class="container px-3 px-md-4">
            <div class="row">
                <div class="col-12 col-md-4 mb-4 mb-md-0">
                    <h3 class="fs-5 fs-md-4">Shop</h3>
                    <ul class="list-unstyled">
                        <li><a href="#" class="fs-6 fs-md-5">All Products</a></li>
                        <li><a href="#" class="fs-6 fs-md-5">New Arrivals</a></li>
                        <li><a href="#" class="fs-6 fs-md-5">Best Sellers</a></li>
                    </ul>
                </div>
                <div class="col-12 col-md-4 mb-4 mb-md-0">
                    <h3 class="fs-5 fs-md-4">Company</h3>
                    <ul class="list-unstyled">
                        <li><a href="#" class="fs-6 fs-md-5">About Us</a></li>
                        <li><a href="#" class="fs-6 fs-md-5">Careers</a></li>
                        <li><a href="#" class="fs-6 fs-md-5">Contact</a></li>
                    </ul>
                </div>
                <div class="col-12 col-md-4">
                    <h3 class="fs-5 fs-md-4">Support</h3>
                    <ul class="list-unstyled">
                        <li><a href="#" class="fs-6 fs-md-5">FAQ</a></li>
                        <li><a href="#" class="fs-6 fs-md-5">Shipping</a></li>
                        <li><a href="#" class="fs-6 fs-md-5">Returns</a></li>
                    </ul>
                </div>
            </div>
            <hr class="my-4">
            <div class="d-flex footer-nav justify-content-center gap-3 mb-2">
                <a href="https://www.facebook.com">
                    <img src="images/facebook.png" alt="fb">
                </a>
                <a href="https://www.instagram.com">
                    <img src="images/instagram.png" alt="ig">
                </a>
                <a href="https://www.tiktok.com">
                    <img src="images/tik-tok.png" alt="tt">
                </a>
            </div>
            <p class="mb-0">&copy; 2026 Luxor. All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
</body>

</html>
